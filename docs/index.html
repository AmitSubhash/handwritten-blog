<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marginalia</title>
<style>
* { box-sizing: border-box; }
body {
    max-width: 900px;
    margin: 3rem auto;
    padding: 0 1.5rem;
    font-family: Georgia, "Times New Roman", serif;
    color: #111;
    background: #fdfdfb;
    line-height: 1.5;
}
h1, h2 { font-weight: normal; }
a { color: #111; }
.post-date { color: #666; font-size: 0.9rem; }
.about-section { margin-bottom: 3rem; }
.page-wrap {
    position: relative;
    margin: 1.5rem 0;
    width: 100%;
}
.page-image {
    width: 100%;
    border: 1px solid #ddd;
    display: block;
}
.link-overlay {
    position: absolute;
    display: block;
    background-color: #35c;
    mix-blend-mode: screen;
}
ul.post-list { list-style: none; padding: 0; }
ul.post-list li { margin-bottom: 1.2rem; }
footer { margin-top: 4rem; color: #999; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="about-section"><div class="page-wrap">
<img class="page-image" src="images/hi-700f4c01/page_000.png" alt="Page 1">
<a class="link-overlay" href="https://github.com/AmitSubhash" title="Github" style="left:2.74%;top:74.02%;width:17.59%;height:4.44%"></a>
<a class="link-overlay" href="https://www.linkedin.com/in/amitsubhash/" title="LinkedIn" style="left:38.70%;top:74.02%;width:23.07%;height:4.44%"></a>
<a class="link-overlay" href="https://x.com/amit1subhash" title="X" style="left:82.49%;top:74.02%;width:5.86%;height:3.81%"></a>
</div></div>
<ul class="post-list">

</ul>
<footer>Written by hand, published from a reMarkable.</footer>
</body>
</html>
