<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marginalia</title>
<style>
body {
    max-width: 720px;
    margin: 3rem auto;
    padding: 0 1.5rem;
    font-family: Georgia, "Times New Roman", serif;
    color: #111;
    background: #fdfdfb;
    line-height: 1.5;
}
h1, h2 { font-weight: normal; }
a { color: #111; }
.post-date { color: #666; font-size: 0.9rem; }
.about-section { margin-bottom: 3rem; }
.page-wrap {
    position: relative;
    margin: 1.5rem 0;
}
.page-image {
    width: 100%;
    border: 1px solid #ddd;
    display: block;
}
.link-overlay {
    position: absolute;
    display: block;
    background-color: #35c;
    mix-blend-mode: screen;
}
.link-icon-hitbox {
    position: absolute;
    display: block;
}
.link-icon-underline {
    position: absolute;
    display: block;
    height: 3px;
    border-radius: 2px;
    background-color: #35c;
    pointer-events: none;
}
ul.post-list { list-style: none; padding: 0; }
ul.post-list li { margin-bottom: 1.2rem; }
footer { margin-top: 4rem; color: #999; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="about-section"><div class="page-wrap">
<img class="page-image" src="images/hi-700f4c01/page_000.png" alt="Page 1">
<a class="link-icon-hitbox" href="https://github.com/AmitSubhash" title="Github" style="left:2.74%;top:51.78%;width:21.11%;height:25.73%"></a>
<div class="link-icon-underline" style="left:2.74%;top:77.51%;width:21.11%"></div>
<a class="link-icon-hitbox" href="https://www.linkedin.com/in/amitsubhash/" title="LinkedIn" style="left:37.53%;top:51.78%;width:24.24%;height:25.73%"></a>
<div class="link-icon-underline" style="left:37.53%;top:77.51%;width:24.24%"></div>
<a class="link-icon-hitbox" href="https://x.com/amit1subhash" title="X" style="left:73.89%;top:51.78%;width:22.28%;height:25.73%"></a>
<div class="link-icon-underline" style="left:73.89%;top:77.51%;width:22.28%"></div>
</div></div>
<ul class="post-list">

</ul>
<footer>Written by hand, published from a reMarkable.</footer>
</body>
</html>
